# IPHS 2022 + WHO SARA validator rulebook (Phase 4 v1).
#
# Each rule encodes one machine-checkable contradiction between a claimed
# capability and the staffing / equipment / tier-scope evidence that an
# IPHS-equivalent facility would be required to show.
#
# Schema:
#   id:                 stable identifier
#   severity:           high | medium | low
#   framework:          IPHS volume + section, or SARA tracer name
#   applies_to:         list of inferred IPHS-equivalent tiers, OR the literal
#                       sentinel `any_facility_with_capability_X` meaning the
#                       rule fires on any facility making the trigger claim
#                       regardless of tier (used because the VF dataset is
#                       ~99% private and IPHS-only-on-public would render the
#                       validator inert).
#   trigger_capability: canonical capability name OR list of canonical names
#                       that activate this rule. (Spec deviation: allowed as a
#                       list to avoid duplicating one playbook bullet across
#                       N rule IDs when the bullet logically applies to a
#                       family of capabilities.)
#   required_evidence:  canonical names that must ALSO be present in the
#                       FacilityClaim for the trigger to be substantiated.
#                       Missing evidence deducts 0.25 per miss from the cap's
#                       iphs_alignment_score (floored at 0.0).
#   flag_text:          human-readable contradiction for the citation UI
#   citation:           IPHS clause or SARA tracer; marked `[uncertain ...]`
#                       when not directly supported by the playbook research
#                       material — never fabricated.

- id: R01
  severity: high
  framework: IPHS Vol II — FRU CHC essential specialists
  applies_to: [any_facility_with_capability_X]
  trigger_capability:
    - surgery_services
    - orthopedic_surgery_services
    - joint_reconstruction_surgery_services
    - obstetric_surgery_caesarean
  required_evidence: [anaesthesiology]
  flag_text: Surgical services claimed without an anaesthesiology provider; IPHS requires an anaesthesiologist (or LSAS-trained MO) at any facility offering surgical care.
  citation: IPHS 2022 Vol II — FRU CHC essential specialists list (Surgeon, Physician, Obstetrician-Gynaecologist, Paediatrician, Anaesthesiologist or LSAS-trained MO).

